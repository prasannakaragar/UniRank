server {
    listen 80;
    server_name unirank.example.com; # Replace with your domain

    # Redirect HTTP to HTTPS (optional but recommended)
    # return 301 https://$host$request_uri;

    location / {
        # Assuming frontend is served separately or as static files
        # root /var/www/unirank/frontend/dist;
        # index index.html;
        # try_files $uri $uri/ /index.html;
        proxy_pass http://localhost:5173; # Development frontend
    }

    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:5000/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static files efficiency
    location /static/ {
        alias /var/www/unirank/backend/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
